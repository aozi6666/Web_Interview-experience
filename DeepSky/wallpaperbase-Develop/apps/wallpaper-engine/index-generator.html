<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>二次元老婆生成器</title>
  <style>
    :root {
      --bg-1: #1a1a2e;
      --bg-2: #16213e;
      --bg-3: #0f3460;
      --accent: #e94560;
      --text: #e8ecf1;
      --muted: #8aa0bf;
      --card: #1f2b4b;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      color: var(--text);
      background: radial-gradient(circle at 20% 0%, #222847 0%, var(--bg-1) 50%, #111827 100%);
      font-family: Inter, "PingFang SC", "Microsoft YaHei", sans-serif;
    }

    #app {
      display: grid;
      grid-template-rows: 64px 1fr;
      height: 100%;
      width: 100%;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      background: linear-gradient(180deg, var(--bg-2), #101c3c);
      border-bottom: 1px solid #25345f;
    }

    .title {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 0.2px;
    }

    .topbar-actions {
      display: flex;
      gap: 8px;
    }

    .btn {
      border: 1px solid #32416c;
      background: var(--bg-3);
      color: var(--text);
      padding: 8px 12px;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.18s ease;
      font-size: 13px;
    }

    .btn:hover {
      border-color: #4a5f93;
      transform: translateY(-1px);
    }

    .btn.primary {
      border-color: #dc4f6d;
      background: var(--accent);
    }

    .content {
      display: grid;
      grid-template-columns: 320px minmax(420px, 1fr) 320px;
      gap: 12px;
      padding: 12px;
      min-height: 0;
    }

    .panel {
      background: linear-gradient(180deg, #1a2749, #121d39);
      border: 1px solid #273760;
      border-radius: 12px;
      min-height: 0;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .panel-header {
      padding: 12px 14px;
      border-bottom: 1px solid #273760;
      font-size: 14px;
      color: var(--muted);
      font-weight: 600;
    }

    .panel-body {
      padding: 12px;
      overflow: auto;
      min-height: 0;
    }

    .slot-group {
      margin-bottom: 14px;
    }

    .slot-title {
      font-size: 13px;
      color: #b6c5df;
      margin-bottom: 8px;
    }

    .slot-grid {
      display: grid;
      grid-template-columns: repeat(4, 64px);
      gap: 8px;
    }

    .part-card {
      width: 64px;
      height: 64px;
      border-radius: 8px;
      border: 2px solid #314878;
      background-color: #0c1933;
      background-repeat: no-repeat;
      background-position: center;
      background-size: cover;
      cursor: pointer;
      position: relative;
    }

    .part-card.active {
      border-color: var(--accent);
      box-shadow: 0 0 0 2px rgba(233, 69, 96, 0.3);
    }

    .preview-wrap {
      position: relative;
      width: 100%;
      height: 100%;
      min-height: 0;
      display: flex;
      flex-direction: column;
    }

    .preview-canvas {
      flex: 1;
      width: 100%;
      height: 100%;
      min-height: 300px;
      border: 0;
      background: linear-gradient(180deg, #1e2f58, #152242);
      border-radius: 10px;
    }

    .status {
      position: absolute;
      left: 16px;
      bottom: 16px;
      font-size: 12px;
      color: var(--muted);
      background: rgba(15, 24, 48, 0.6);
      padding: 4px 8px;
      border-radius: 8px;
      border: 1px solid #2b3c65;
    }

    .param-item {
      margin-bottom: 12px;
    }

    .param-row {
      display: flex;
      justify-content: space-between;
      font-size: 13px;
      margin-bottom: 6px;
      color: #b6c5df;
    }

    .param-item input[type="range"] {
      width: 100%;
      accent-color: var(--accent);
    }

    .preset-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 12px;
    }

    .preset-btn {
      border: 1px solid #334874;
      background: #13254a;
      color: var(--text);
      border-radius: 8px;
      padding: 6px 10px;
      cursor: pointer;
      font-size: 12px;
    }
  </style>
</head>
<body>
  <div id="app">
    <header class="topbar">
      <div class="title">二次元老婆生成器</div>
      <div class="topbar-actions">
        <button id="btn-random" class="btn primary">随机生成</button>
        <button id="btn-reset" class="btn">重置</button>
        <button id="btn-export-png" class="btn">导出 PNG</button>
        <button id="btn-export-json" class="btn">导出 JSON</button>
      </div>
    </header>

    <main class="content">
      <section class="panel">
        <div class="panel-header">部件选择</div>
        <div id="part-panel" class="panel-body"></div>
      </section>

      <section class="panel">
        <div class="panel-header">实时预览</div>
        <div class="panel-body preview-wrap">
          <canvas id="generator-canvas" class="preview-canvas"></canvas>
          <div id="preview-status" class="status">初始化中...</div>
        </div>
      </section>

      <section class="panel">
        <div class="panel-header">参数面板</div>
        <div id="param-panel" class="panel-body">
          <div class="param-item">
            <div class="param-row"><span>左眼开合</span><span id="val-eye-l">1.00</span></div>
            <input id="param-eye-l" type="range" min="0" max="1" step="0.01" value="1" />
          </div>
          <div class="param-item">
            <div class="param-row"><span>右眼开合</span><span id="val-eye-r">1.00</span></div>
            <input id="param-eye-r" type="range" min="0" max="1" step="0.01" value="1" />
          </div>
          <div class="param-item">
            <div class="param-row"><span>嘴巴开合</span><span id="val-mouth">0.00</span></div>
            <input id="param-mouth" type="range" min="0" max="1" step="0.01" value="0" />
          </div>
          <div class="param-item">
            <div class="param-row"><span>AngleX</span><span id="val-angle-x">0</span></div>
            <input id="param-angle-x" type="range" min="-30" max="30" step="1" value="0" />
          </div>
          <div class="param-item">
            <div class="param-row"><span>AngleY</span><span id="val-angle-y">0</span></div>
            <input id="param-angle-y" type="range" min="-30" max="30" step="1" value="0" />
          </div>
          <div class="param-item">
            <div class="param-row"><span>AngleZ</span><span id="val-angle-z">0</span></div>
            <input id="param-angle-z" type="range" min="-30" max="30" step="1" value="0" />
          </div>
          <div class="preset-row">
            <button id="preset-neutral" class="preset-btn">默认</button>
            <button id="preset-happy" class="preset-btn">开心</button>
            <button id="preset-shy" class="preset-btn">害羞</button>
            <button id="toggle-blink" class="preset-btn">自动眨眼: 开</button>
          </div>
        </div>
      </section>
    </main>
  </div>

  <script type="module" src="/app/generator.ts"></script>
</body>
</html>
